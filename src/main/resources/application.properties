spring.application.name=ratemesh
spring.autoconfigure.exclude=org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

ratelimiter.capacity=5
ratelimiter.refillRate=1.0

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms