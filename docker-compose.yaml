services:
  redis:
    image: redis:7.0.11
    container_name: redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    networks:
      - ratemesh-network
  app1:
    build: .
    container_name: app1
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      ADMIN_API_KEY: secret123 # in production, use ${ADMIN_API_KEY} from .env
    depends_on:
      - redis
    networks:
      - ratemesh-network
  app2:
    build: .
    container_name: app2
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      ADMIN_API_KEY: secret123 # in production, use ${ADMIN_API_KEY} from .env
    depends_on:
      - redis
    networks:
      - ratemesh-network
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2
    networks:
      - ratemesh-network
networks:
  ratemesh-network:
    driver: bridge
